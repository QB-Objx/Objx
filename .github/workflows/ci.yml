name: CI
# GitHub org/repo: qbobjx/objx
# Package name remains: objx

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, Typecheck, Test (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Smoke test published package installs
        run: npm run smoke:packages

  integration-databases:
    name: Integration Databases (Postgres + MySQL, Node 22)
    needs:
      - validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: objx_test
          POSTGRES_USER: objx
          POSTGRES_PASSWORD: objx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U objx -d objx_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: objx_test
          MYSQL_USER: objx
          MYSQL_PASSWORD: objx
          MYSQL_ROOT_PASSWORD: root
          MYSQL_ROOT_HOST: '%'
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uobjx -pobjx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    env:
      POSTGRES_DATABASE_URL: postgresql://objx:objx@127.0.0.1:5432/objx_test
      MYSQL_DATABASE_URL: mysql://objx:objx@127.0.0.1:3306/objx_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install integration database clients
        run: npm install --no-save pg mysql2

      - name: Run integration tests against real databases
        run: npm run test:integration

  publish-npm:
    name: Publish to npm
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'QB-Objx/Objx'
    needs:
      - validate
      - integration-databases
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Use repository npm version
        run: npm install -g npm@11.6.2

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Remove legacy npm auth config
        run: npm config delete always-auth --location=user || true

      - name: Install dependencies
        run: npm ci

      - name: Version and publish packages
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run publish:ci
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
